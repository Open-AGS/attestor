global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml
  - /etc/prometheus/recording-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: attestor-api
    metrics_path: /api/v1/metrics
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/metrics-api-key
    static_configs:
      - targets:
          - attestor-api:3700

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100

  - job_name: tempo
    static_configs:
      - targets:
          - tempo:3200
