apiVersion: apps/v1
kind: Deployment
metadata:
  name: attestor-worker
spec:
  replicas: 2
  minReadySeconds: 10
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: attestor-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: attestor-worker
    spec:
      serviceAccountName: attestor-worker-runtime
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 90
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: attestor-worker
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: attestor-worker
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: attestor-worker
      containers:
        - name: worker
          image: europe-west1-docker.pkg.dev/project-9180cbda-d681-42d8-8ca/attestor/attestor-worker:de677b9-gke1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          command: ["node", "dist/service/worker.js"]
          envFrom:
            - configMapRef:
                name: attestor-runtime
          env:
            - name: OTEL_SERVICE_NAME
              value: "attestor-worker"
            - name: ATTESTOR_HA_MODE
              value: "true"
            - name: ATTESTOR_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_SERVICE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ATTESTOR_WORKER_HEALTH_PORT
              value: "9808"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: redis-url
            - name: ATTESTOR_PG_URL
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: runtime-pg-url
                  optional: true
            - name: ATTESTOR_ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: admin-api-key
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 20"]
          ports:
            - containerPort: 9808
              name: health
          startupProbe:
            httpGet:
              path: /health
              port: health
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
