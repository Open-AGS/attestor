<text class="title" x="60" y="62">Attestor Full Consequence Path Map</text>
<text class="subtitle" x="60" y="94">AI proposes. Admission decides. Release proves. Enforcement verifies. Customer gate enforces. Action happens, or nothing happens.</text>

<rect class="boundary" x="40" y="122" width="1650" height="990"/>
<text class="section" x="70" y="152">Attestor decision and proof boundary</text>

<rect class="gateBoundary" x="1730" y="610" width="800" height="370"/>
<text class="section" x="1760" y="640">Customer / downstream enforcement boundary</text>

<rect class="proofBoundary" x="1730" y="1015" width="800" height="600"/>
<text class="section" x="1760" y="1045">Receipt and proof boundary</text>

<rect class="node" x="85" y="190" width="350" height="125"/>
<text class="label" x="110" y="220">AI AGENT / WORKFLOW</text>
<text class="body" x="110" y="248">Proposes an action intent:</text>
<text class="tiny" x="110" y="273">refund, export, send, role change, operation</text>
<text class="tiny" x="110" y="296">Authority: none. Output is untrusted.</text>

<path class="arrow" d="M435 252 H515"/>

<rect class="node" x="520" y="190" width="365" height="125"/>
<text class="label" x="545" y="220">ACTION INTENT NORMALIZER</text>
<text class="body" x="545" y="248">Creates strict consequence request.</text>
<text class="tiny" x="545" y="273">action, actor, tenant, target, scope</text>
<text class="tiny" x="545" y="296">evidence refs, approval refs, idempotency</text>

<path class="holdArrow" d="M705 315 V390 H375 V455"/>
<rect class="terminalHold" x="210" y="455" width="330" height="92"/>
<text class="terminalText" x="245" y="492">HOLD BEFORE DECISION</text>
<text class="tiny" x="245" y="520">invalid or incomplete intent; no downstream action</text>

<path class="arrow" d="M885 252 H965"/>

<rect class="panel" x="970" y="150" width="520" height="210"/>
<text class="section" x="1000" y="180">PIP: Policy / Evidence / Context Inputs</text>
<text class="body" x="1000" y="212">policy version, policy refs, evidence refs</text>
<text class="body" x="1000" y="238">actor authority, approval provenance</text>
<text class="body" x="1000" y="264">tenant, target, audience, scope</text>
<text class="body" x="1000" y="290">freshness, no-go holds, replay identity</text>
<text class="body" x="1000" y="316">provider/cost context, proof refs</text>

<path class="arrow" d="M1230 360 V430"/>

<polygon class="diamond" points="1230,430 1500,535 1230,640 960,535"/>
<text class="label" x="1110" y="508">PDP: CONSEQUENCE</text>
<text class="label" x="1118" y="532">ADMISSION CORE</text>
<text class="tiny" x="1084" y="560">policy, evidence, authority, tenant, scope,</text>
<text class="tiny" x="1106" y="582">freshness, no-go, replay, deterministic checks</text>

<path class="arrow" d="M1040 610 L760 720"/>
<path class="arrow" d="M1170 642 L1055 720"/>
<path class="holdArrow" d="M1320 642 L1460 720"/>
<path class="holdArrow" d="M1420 600 L1720 720"/>

<rect class="nodeGreen" x="575" y="720" width="285" height="95"/>
<text class="label" x="665" y="750">ADMIT</text>
<text class="tiny" x="612" y="777">allowed as requested</text>
<text class="tiny" x="612" y="800">may continue with proof</text>

<rect class="nodeGold" x="910" y="720" width="285" height="95"/>
<text class="label" x="1002" y="750">NARROW</text>
<text class="tiny" x="944" y="777">allowed only in bounds</text>
<text class="tiny" x="944" y="800">constraints bind execution</text>

<rect class="nodeRed" x="1315" y="720" width="285" height="95"/>
<text class="label" x="1402" y="750">REVIEW</text>
<text class="tiny" x="1350" y="777">human/operator hold</text>
<text class="tiny" x="1350" y="800">no executable authority</text>

<rect class="nodeRed" x="1660" y="720" width="285" height="95"/>
<text class="label" x="1753" y="750">BLOCK</text>
<text class="tiny" x="1700" y="777">fail closed</text>
<text class="tiny" x="1700" y="800">no executable authority</text>

<path class="holdArrow" d="M1458 815 V885 H1915"/>
<path class="holdArrow" d="M1802 815 V885 H1915"/>
<rect class="terminalHold" x="1915" y="840" width="340" height="90"/>
<text class="terminalText" x="1960" y="876">NO DOWNSTREAM ACTION</text>
<text class="tiny" x="1960" y="904">review/block produces proof-only hold</text>

<path class="arrow" d="M718 815 V910 H910"/>
<path class="arrow" d="M1052 815 V910 H910"/>
<rect class="panelGold" x="760" y="910" width="620" height="180"/>
<text class="section" x="790" y="940">PAP / Release Authorization Layer</text>
<text class="body" x="790" y="972">Only admit/narrow enter this path.</text>
<text class="body" x="790" y="998">Binds decision id, policy version, tenant, target,</text>
<text class="body" x="790" y="1024">allowed or narrowed scope, proof refs, expiry, sender.</text>
<text class="body" x="790" y="1050">Signs protected release token and registers introspection.</text>

<path class="holdArrow" d="M1380 1000 H1575 V1138"/>
<rect class="terminalHold" x="1415" y="1138" width="310" height="82"/>
<text class="terminalText" x="1466" y="1173">NO RELEASE</text>
<text class="tiny" x="1466" y="1199">binding/signing failure holds</text>

<path class="arrow" d="M1070 1090 V1185"/>

<rect class="panel" x="735" y="1185" width="670" height="210"/>
<text class="section" x="765" y="1215">PEP: Release Enforcement Verifier</text>
<text class="body" x="765" y="1246">verifies token signature, expiry, audience, tenant, target</text>
<text class="body" x="765" y="1272">checks sender-constrained presentation and body digest</text>
<text class="body" x="765" y="1298">requires online introspection and replay consumption</text>
<text class="body" x="765" y="1324">matches release proof ref to admission proof</text>
<text class="tiny" x="765" y="1356">failure reasons: stale, replayed, missing proof, wrong binding</text>

<path class="holdArrow" d="M1405 1288 H1585 V1395 H1915"/>
<rect class="terminalHold" x="1915" y="1355" width="340" height="90"/>
<text class="terminalText" x="1990" y="1391">HOLD</text>
<text class="tiny" x="1960" y="1419">invalid verifier result; no downstream action</text>

<path class="arrow" d="M1405 1290 H1755"/>

<rect class="panelRed" x="1755" y="680" width="700" height="275"/>
<text class="section" x="1785" y="712">Customer Gate / Downstream PEP</text>
<text class="body" x="1785" y="744">Production: customer-owned and customer-operated.</text>
<text class="body" x="1785" y="770">Checks Attestor decision, valid release proof, replay,</text>
<text class="body" x="1785" y="796">tenant, target, action, body digest, and allowed scope.</text>
<text class="body" x="1785" y="822">If any check fails, nothing happens.</text>
<text class="tiny" x="1785" y="854">This is where non-bypassability must be proven in a real customer deployment.</text>

<path class="holdArrow" d="M2110 955 V1015"/>
<rect class="terminalHold" x="1915" y="1015" width="390" height="92"/>
<text class="terminalText" x="1960" y="1052">NOTHING HAPPENS</text>
<text class="tiny" x="1960" y="1080">gate failed; no refund/export/send/write</text>

<path class="arrow" d="M2455 818 H2520 V1215 H2360"/>
<rect class="terminalProceed" x="1955" y="1170" width="405" height="95"/>
<text class="terminalText" x="2018" y="1208">REAL DOWNSTREAM ACTION</text>
<text class="tiny" x="2018" y="1236">refund, export, send, role change, operation</text>

<path class="arrow" d="M2158 1265 V1350"/>
<rect class="nodeGreen" x="1925" y="1350" width="465" height="110"/>
<text class="label" x="2058" y="1383">DOWNSTREAM RECEIPT</text>
<text class="body" x="1960" y="1412">what executed, where, when, provider/job/transaction ref</text>
<text class="tiny" x="1960" y="1438">executed scope digest; no raw sensitive payload</text>

<path class="arrow" d="M2158 1460 V1532"/>
<rect class="panelGold" x="1785" y="1532" width="745" height="230"/>
<text class="section" x="1815" y="1564">Digest-Only Proof Packet / Audit Output</text>
<text class="body" x="1815" y="1596">AI action digest, normalized request digest, PDP decision</text>
<text class="body" x="1815" y="1622">reason codes, policy version, evidence refs, constraints</text>
<text class="body" x="1815" y="1648">release token id/digest, introspection, replay, gate result</text>
<text class="body" x="1815" y="1674">downstream receipt refs, redaction scan, no-claims</text>
<text class="tiny" x="1815" y="1710">Never store raw token, raw prompt, raw provider body, raw rows, credentials, or customer identifiers.</text>

<rect class="panelGreen" x="85" y="610" width="410" height="350"/>
<text class="section" x="115" y="642">Decision Vocabulary</text>
<text class="body" x="115" y="678">admit: proceed as requested</text>
<text class="body" x="115" y="704">narrow: proceed only within constraints</text>
<text class="body" x="115" y="730">review: hold for human/operator review</text>
<text class="body" x="115" y="756">block: fail closed</text>
<text class="body" x="115" y="800">Allowed branches still need:</text>
<text class="tiny" x="135" y="826">protected release token</text>
<text class="tiny" x="135" y="850">online introspection</text>
<text class="tiny" x="135" y="874">replay consumption</text>
<text class="tiny" x="135" y="898">customer/downstream gate</text>

<rect class="panel" x="85" y="1015" width="520" height="330"/>
<text class="section" x="115" y="1048">Module Groups Feeding This Path</text>
<text class="body" x="115" y="1080">src/api/*: provider edge, optional action source</text>
<text class="body" x="115" y="1106">src/consequence-admission/*: admission PDP and gate</text>
<text class="body" x="115" y="1132">src/release-kernel/* and src/release-layer/*: release</text>
<text class="body" x="115" y="1158">src/release-policy-control-plane/*: policy/PAP</text>
<text class="body" x="115" y="1184">src/release-enforcement-plane/*: verifier/PEP</text>
<text class="body" x="115" y="1210">src/service/*: routes, stores, runtime composition</text>
<text class="body" x="115" y="1236">domain packs: financial, crypto, filing, data, ops</text>
<text class="body" x="115" y="1262">src/signing/* and proof surfaces: verification artifacts</text>
<text class="tiny" x="115" y="1300">Shadow-to-policy modules inform future policy; they are not the enforcement edge.</text>

<rect class="panelRed" x="85" y="1395" width="520" height="315"/>
<text class="section" x="115" y="1428">Failure Paths That Must Hold</text>
<text class="body" x="115" y="1460">invalid intent, missing proof, wrong tenant</text>
<text class="body" x="115" y="1486">wrong target/audience, wrong action</text>
<text class="body" x="115" y="1512">stale token, missing sender constraint</text>
<text class="body" x="115" y="1538">missing online introspection, replayed authorization</text>
<text class="body" x="115" y="1564">scope outside allowed bounds, redaction failure</text>
<text class="tiny" x="115" y="1602">If the failure is execution-related: no downstream call.</text>
<text class="tiny" x="115" y="1626">If the failure is output-related: artifact is not shareable.</text>

<rect class="panelGold" x="735" y="1440" width="670" height="270"/>
<text class="section" x="765" y="1472">No-Claims Kept Visible</text>
<text class="body" x="765" y="1504">not production readiness</text>
<text class="body" x="765" y="1530">not enterprise readiness</text>
<text class="body" x="765" y="1556">not live customer PEP no-bypass</text>
<text class="body" x="765" y="1582">not live shared replay/introspection stores</text>
<text class="body" x="765" y="1608">not external KMS/HSM-backed runtime signing</text>
<text class="body" x="765" y="1634">not customer deployment or compliance certification</text>
</svg>
