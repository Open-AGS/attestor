<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1900" viewBox="0 0 2600 1900" role="img" aria-labelledby="title desc">
<title id="title">Attestor Full Consequence Path Map</title>
<desc id="desc">A one-picture map of the Attestor consequence engine: AI action intent, normalizer, PIP inputs, PDP admission decision, release authorization, enforcement verifier, customer gate, real downstream action or hold, receipt, and proof packet.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#dbeafe"/>
  </marker>
  <style>
    .page{fill:#06111f}
    .grid{stroke:#10263a;stroke-width:1}
    .title{font:700 38px Arial,Helvetica,sans-serif;fill:#f8fdff}
    .subtitle{font:400 18px Arial,Helvetica,sans-serif;fill:#b8d7e6}
    .section{font:700 18px Arial,Helvetica,sans-serif;fill:#f8fdff}
    .label{font:700 15px Arial,Helvetica,sans-serif;fill:#f8fdff}
    .body{font:400 13px Arial,Helvetica,sans-serif;fill:#dbeafe}
    .tiny{font:400 11.5px Arial,Helvetica,sans-serif;fill:#a9c3d3}
    .node{fill:#0c2337;stroke:#65c9f2;stroke-width:1.5;rx:10}
    .nodeGreen{fill:#10351f;stroke:#67d68f;stroke-width:1.5;rx:10}
    .nodeGold{fill:#3a300e;stroke:#f4c542;stroke-width:1.5;rx:10}
    .nodeRed{fill:#421a1d;stroke:#ff8f79;stroke-width:1.5;rx:10}
    .nodeGray{fill:#101827;stroke:#8798ad;stroke-width:1.2;rx:10}
    .panel{fill:#091827;stroke:#31516b;stroke-width:1.25;rx:14}
    .panelGreen{fill:#081c16;stroke:#3e9d70;stroke-width:1.25;rx:14}
    .panelGold{fill:#17150b;stroke:#8d7834;stroke-width:1.25;rx:14}
    .panelRed{fill:#1f1014;stroke:#8d3944;stroke-width:1.25;rx:14}
    .branch{fill:#16243a;stroke:#52657a;stroke-width:1;rx:8}
    .diamond{fill:#551823;stroke:#ff9a8f;stroke-width:1.6}
    .arrow{stroke:#dbeafe;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .softArrow{stroke:#9fbad0;stroke-width:1.5;fill:none;stroke-dasharray:7 7;marker-end:url(#arrow)}
    .holdArrow{stroke:#ffb199;stroke-width:1.7;fill:none;stroke-dasharray:7 7;marker-end:url(#arrow)}
    .boundary{fill:none;stroke:#3b82f6;stroke-width:2.2;stroke-dasharray:13 9;rx:18}
    .gateBoundary{fill:none;stroke:#fb7185;stroke-width:2.4;stroke-dasharray:13 9;rx:18}
    .proofBoundary{fill:none;stroke:#f4c542;stroke-width:2.2;stroke-dasharray:10 8;rx:18}
    .terminalProceed{fill:#0f7a4f;stroke:#75e0ae;stroke-width:2;rx:12}
    .terminalHold{fill:#9b1c1c;stroke:#ff9a8f;stroke-width:2;rx:12}
    .terminalText{font:700 24px Arial,Helvetica,sans-serif;fill:#ffffff}
  </style>
</defs>
