apiVersion: apps/v1
kind: Deployment
metadata:
  name: attestor-otel-gateway
  namespace: attestor-observability
spec:
  replicas: 2
  revisionHistoryLimit: 3
  minReadySeconds: 10
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: attestor-otel-gateway
  template:
    metadata:
      labels:
        app: attestor-otel-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8889"
    spec:
      serviceAccountName: attestor-otel-gateway
      terminationGracePeriodSeconds: 30
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.152.0@sha256:f41d7995565df3733b7568702073a9c490792f9c6ac60684fe6a4da21a313f8d
          args:
            - --config=/conf/collector-config.yaml
          env:
            - name: TEMPO_OTLP_ENDPOINT
              value: tempo.monitoring.svc.cluster.local:4317
            - name: LOKI_OTLP_ENDPOINT
              value: http://loki.monitoring.svc.cluster.local:3100/otlp
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: metrics
              containerPort: 8889
            - name: health
              containerPort: 13133
          readinessProbe:
            httpGet:
              path: /
              port: health
          livenessProbe:
            httpGet:
              path: /
              port: health
          startupProbe:
            httpGet:
              path: /
              port: health
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: attestor-otel-gateway-config
