apiVersion: v1
kind: ConfigMap
metadata:
  name: attestor-otel-gateway-config
  namespace: attestor-observability
data:
  collector-config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      basicauth/grafana_cloud:
        client_auth:
          username: ${GRAFANA_CLOUD_OTLP_USERNAME}
          password: ${GRAFANA_CLOUD_OTLP_TOKEN}
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
        spike_limit_mib: 128
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.node.name
            - k8s.deployment.name
      resourcedetection:
        detectors: [system]
        timeout: 2s
        override: false
      batch:
        timeout: 1s
        send_batch_size: 1024
    exporters:
      otlphttp/grafana_cloud:
        endpoint: ${GRAFANA_CLOUD_OTLP_ENDPOINT}
        auth:
          authenticator: basicauth/grafana_cloud
      prometheus:
        endpoint: 0.0.0.0:8889
        resource_to_telemetry_conversion:
          enabled: true
    service:
      extensions: [health_check, basicauth/grafana_cloud]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection, batch]
          exporters: [otlphttp/grafana_cloud]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection, batch]
          exporters: [otlphttp/grafana_cloud, prometheus]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection, batch]
          exporters: [otlphttp/grafana_cloud]
