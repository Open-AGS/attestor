apiVersion: v1
kind: ConfigMap
metadata:
  name: attestor-runtime
data:
  PORT: "3700"
  ATTESTOR_HA_MODE: "true"
  ATTESTOR_RUNTIME_PROFILE: "production-shared"
  ATTESTOR_RELEASE_RUNTIME_PKI_PATH: "/var/lib/attestor/release-runtime-pki/release-runtime-pki.json"
  ATTESTOR_RELEASE_RUNTIME_PKI_SHARED_PATH: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://attestor-observability-receiver.attestor-observability.svc.cluster.local:4318"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_SERVICE_NAME: "attestor-api"
