  <rect class="nodeGreen" x="36" y="132" width="176" height="58"/>
  <text class="label" x="54" y="157">AI agent / app</text>
  <text class="body" x="54" y="176">proposed consequence</text>
  <rect class="nodeGreen" x="36" y="218" width="176" height="58"/>
  <text class="label" x="54" y="243">Operator / reviewer</text>
  <text class="body" x="54" y="262">human authority</text>
  <rect class="nodeGreen" x="36" y="304" width="176" height="58"/>
  <text class="label" x="54" y="329">LLM / package caller</text>
  <text class="body" x="54" y="348">provider or SDK edge</text>

