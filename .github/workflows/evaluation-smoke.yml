name: Evaluation Smoke

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  evaluation-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Evaluation packet docs
        run: npm run test:evaluation-packet-docs

      - name: Evaluation release notes
        run: npm run test:evaluation-release-notes

      - name: Security baseline docs
        run: npm run test:security-baseline-docs

      - name: Audit finding test coverage
        run: npm run test:audit-finding-test-coverage

      - name: Package script runner contract
        run: npm run test:package-script-runner

      - name: Admission demo
        run: npm run example:admission

      - name: Customer gate demo
        run: npm run example:customer-gate

      - name: Render proof surface
        run: npm run proof:surface

      - name: Upload proof surface artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: proof-surface
          path: .attestor/proof-surface/latest/
          if-no-files-found: error
