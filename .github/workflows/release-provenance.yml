name: Release Provenance

on:
  workflow_dispatch:
  push:
    tags:
      - "v*-evaluation"

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  release-provenance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Render proof surface
        run: npm run proof:surface

      - name: Render proof showcase
        run: npm run showcase:proof

      - name: Generate CycloneDX SBOM
        run: |
          mkdir -p .attestor/release-provenance
          npm run sbom:cyclonedx

      - name: Scan release artifacts for redaction
        run: npm run check:public-artifacts-redaction

      - name: Summarize release artifact disclosure boundary
        run: |
          {
            echo "### Release artifact disclosure boundary"
            echo "- Generated proof and showcase artifacts passed the public artifact redaction scan before upload."
            echo "- GitHub artifact attestation proves archive provenance and integrity, not safe public disclosure by itself."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Package release evaluation artifacts
        run: |
          mkdir -p .attestor/release-provenance
          tar -czf .attestor/release-provenance/evaluation-artifacts.tar.gz \
            .attestor/proof-surface/latest \
            .attestor/showcase/latest \
            .attestor/release-provenance/sbom.cyclonedx.json \
            docs/00-evaluation \
            SECURITY.md \
            docs/08-deployment/artifact-attestation-plan.md

      - name: Upload release evaluation artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: evaluation-artifacts
          path: .attestor/release-provenance/evaluation-artifacts.tar.gz
          if-no-files-found: error

      - name: Attest release evaluation artifact provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: .attestor/release-provenance/evaluation-artifacts.tar.gz

      - name: Attest release evaluation artifact SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: .attestor/release-provenance/evaluation-artifacts.tar.gz
          sbom-path: .attestor/release-provenance/sbom.cyclonedx.json
