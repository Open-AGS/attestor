<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1510" viewBox="0 0 1800 1510" role="img" aria-labelledby="title desc">
  <title id="title">Attestor Internal Machine Map</title>
  <desc id="desc">Dark system-design graph of Attestor. Includes Callers, Route Lanes, And Runtime Ingress, Core route group, Public site and proof route group, Auth and account route group, Admin and operator route group, Pipeline route group, Admission and shadow route group, Webhook route group, Ten Decision Axes Applied To The Same Candidate, Policy Control Plane, Release PDP, Domain Packs Into Admission PDP, Admission PDP, Enforcement PEP, Customer Gate, Terminal Outcomes, Shared Stores, Support Surfaces, Shadow-To-Policy Loop, PROCEED, HOLD, and all top-level src directories: src/api src/connectors src/consequence-admission src/crypto-authorization-core src/crypto-execution-admission src/crypto-intelligence src/domains src/filing src/financial src/identity src/platform src/proof-surface src/release-enforcement-plane src/release-kernel src/release-layer src/release-policy-control-plane src/service src/showcase src/signing src/utils.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dbeafe"/>
    </marker>
    <style>
      .page { fill: #07101d; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #f8fdff; }
      .subtitle { font: 400 14px Arial, Helvetica, sans-serif; fill: #b8d7e6; }
      .label { font: 700 12.8px Arial, Helvetica, sans-serif; fill: #f8fdff; }
      .body { font: 400 11.5px Arial, Helvetica, sans-serif; fill: #dbeafe; }
      .tiny { font: 400 10px Arial, Helvetica, sans-serif; fill: #a9c3d3; }
      .nodeGreen { fill: #12351f; stroke: #64d487; stroke-width: 1.25; rx: 8; }
      .nodeBlue { fill: #0c3554; stroke: #61c7f2; stroke-width: 1.35; rx: 8; }
      .nodeBlue2 { fill: #0b2a43; stroke: #57afd7; stroke-width: 1.2; rx: 8; }
      .nodeYellow { fill: #3a2f0d; stroke: #f4c542; stroke-width: 1.2; rx: 8; }
      .nodeRed { fill: #4c2119; stroke: #ff8f79; stroke-width: 1.3; rx: 6; }
      .nodeGray { fill: #101827; stroke: #8798ad; stroke-width: 1.15; rx: 8; }
      .decision { fill: #541721; stroke: #ff9a8f; stroke-width: 1.35; }
      .bus { fill: #f8fdff; stroke: #f8fdff; stroke-width: 1; }
      .arrow { stroke: #dbeafe; stroke-width: 1.45; fill: none; marker-end: url(#arrow); }
      .thinArrow { stroke: #b8d7e6; stroke-width: 1.1; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #9ca3af; stroke-width: 1.1; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .soft { stroke: #32536b; stroke-width: 1; fill: none; }
      .proceed { fill: #0f7a4f; stroke: #75e0ae; stroke-width: 1.6; rx: 10; }
      .hold { fill: #9b1c1c; stroke: #ff9a8f; stroke-width: 1.6; rx: 10; }
      .termText { font: 700 18px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .chip { fill: #101827; stroke: #8798ad; stroke-width: 1; rx: 7; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1800" height="1510"/>
  <text class="title" x="36" y="48">Attestor Internal Machine Map</text>
  <text class="subtitle" x="36" y="74">Dark system-design graph: route lanes and ten dimensions converge into one candidate context, then release, admission, enforcement, customer gate, and PROCEED/HOLD.</text>

