## Attestor Service Topology — Local Development
##
## Services:
##   api    — Hono HTTP server (port 3700)
##   worker — BullMQ pipeline worker (separate process)
##   postgres — PostgreSQL 16 with RLS support
##   redis  — Redis 7 for BullMQ job queue
##
## Usage: docker compose up
##
## Production topology is the same service split — api and worker
## connect to managed Redis and PostgreSQL via environment variables.

services:
  api:
    build: .
    command: node dist/service/api-server.js
    ports:
      - "3700:3700"
    environment:
      ATTESTOR_PG_URL: postgresql://attestor:attestor@postgres:5432/attestor
      REDIS_URL: redis://redis:6379
      ATTESTOR_TENANT_KEYS: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('node:http').get('http://localhost:3700/api/v1/ready', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build: .
    command: node dist/service/worker.js
    environment:
      REDIS_URL: redis://redis:6379
      ATTESTOR_PG_URL: postgresql://attestor:attestor@postgres:5432/attestor
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: attestor
      POSTGRES_PASSWORD: attestor
      POSTGRES_DB: attestor
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attestor"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
