upstream attestor_api {
  least_conn;
  server api1:3700 max_fails=3 fail_timeout=10s;
  server api2:3700 max_fails=3 fail_timeout=10s;
}

server {
  listen 8080;
  server_name _;

  location / {
    proxy_pass http://attestor_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    # This reference nginx is the immediate trusted edge for Attestor.
    # Overwrite inbound forwarded headers so clients cannot choose the first hop.
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
  }
}
