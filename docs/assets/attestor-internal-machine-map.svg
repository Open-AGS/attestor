<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="2060" viewBox="0 0 1320 2060" role="img" aria-labelledby="title desc">
  <title id="title">Attestor internal machine map</title>
  <desc id="desc">One-picture map of Attestor route lanes, ten decision axes, release PDP, admission PDP, enforcement PEP, customer gate, stores, side loops, terminal outcomes, and top-level source areas.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263238"/>
    </marker>
    <style>
      .page { fill: #f7f9fc; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #102033; }
      .subtitle { font: 400 15px Arial, Helvetica, sans-serif; fill: #34495e; }
      .section { fill: #ffffff; stroke: #9aa8b6; stroke-width: 1.5; rx: 14; }
      .sectionTitle { font: 700 18px Arial, Helvetica, sans-serif; fill: #102033; }
      .box { fill: #eef5ff; stroke: #2d6cdf; stroke-width: 1.6; rx: 10; }
      .box2 { fill: #eefaf4; stroke: #1f8a5b; stroke-width: 1.6; rx: 10; }
      .box3 { fill: #fff6e6; stroke: #c77a00; stroke-width: 1.6; rx: 10; }
      .box4 { fill: #f7efff; stroke: #7b3fc7; stroke-width: 1.6; rx: 10; }
      .store { fill: #f1f4f8; stroke: #607d8b; stroke-width: 1.6; rx: 10; }
      .term { fill: #102033; stroke: #102033; stroke-width: 1.6; }
      .diamond { fill: #fff2f0; stroke: #cf3c2f; stroke-width: 1.7; }
      .label { font: 700 13px Arial, Helvetica, sans-serif; fill: #102033; }
      .small { font: 400 11.5px Arial, Helvetica, sans-serif; fill: #2e4053; }
      .tiny { font: 400 10.5px Arial, Helvetica, sans-serif; fill: #34495e; }
      .white { fill: #ffffff; }
      .axis { fill: #eaf7ff; stroke: #2680a8; stroke-width: 1.2; rx: 8; }
      .chip { fill: #ffffff; stroke: #bcc8d6; stroke-width: 1.1; rx: 8; }
      .arrow { stroke: #263238; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #607d8b; stroke-width: 1.4; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1320" height="2060"/>
  <text class="title" x="40" y="50">Attestor Internal Machine Map</text>
  <text class="subtitle" x="40" y="78">One picture. Rectangles are components/stores. Diamonds are decision points. Circles are terminal outcomes. Thin dashed arrows are side-loop feedback.</text>

  <rect class="section" x="30" y="105" width="1260" height="270"/>
  <text class="sectionTitle" x="50" y="135">1. Callers, Route Lanes, And Runtime Ingress</text>

  <rect class="box" x="50" y="160" width="235" height="115"/>
  <text class="label" x="68" y="185">Callers</text>
  <text class="small" x="68" y="207">AI agent / app / operator</text>
  <text class="small" x="68" y="225">LLM provider edge</text>
  <text class="small" x="68" y="243">generic action / finance run</text>
  <text class="small" x="68" y="261">crypto plan / release caller</text>

  <rect class="box" x="330" y="160" width="235" height="115"/>
  <text class="label" x="348" y="185">Service Ingress</text>
  <text class="small" x="348" y="207">src/service/* Hono routes</text>
  <text class="small" x="348" y="225">tenant/account/auth context</text>
  <text class="small" x="348" y="243">production request guard</text>
  <text class="small" x="348" y="261">bootstrap route runtime</text>

  <polygon class="diamond" points="705,150 825,217 705,284 585,217"/>
  <text class="label" x="641" y="207">Entry path</text>
  <text class="small" x="645" y="226">route lane?</text>

  <rect class="box3" x="865" y="140" width="385" height="195"/>
  <text class="label" x="885" y="165">Route lanes</text>
  <text class="small" x="885" y="187">Core route group: startup / health / ready / domains / connectors / metrics</text>
  <text class="small" x="885" y="205">Public site and proof route group: site / proof / billing return pages</text>
  <text class="small" x="885" y="223">Auth and account route group: OIDC / SAML / passkeys / MFA / API keys / billing</text>
  <text class="small" x="885" y="241">Admin and operator route group: accounts / tenant keys / queue / reviews / policy control</text>
  <text class="small" x="885" y="259">Pipeline route group: run / run-async / status / verify / filing export</text>
  <text class="small" x="885" y="277">Admission and shadow route group: admissions / policy foundry / onboarding</text>
  <text class="small" x="885" y="295">Webhook route group: Stripe billing / SendGrid / Mailgun</text>
  <text class="small" x="885" y="313">release-layer caller</text>

  <path class="arrow" d="M285 218 H330"/>
  <path class="arrow" d="M565 218 H585"/>
  <path class="arrow" d="M825 218 H865"/>

  <rect class="section" x="30" y="405" width="1260" height="210"/>
  <text class="sectionTitle" x="50" y="435">2. Ten Decision Axes Applied To The Same Candidate</text>
  <text class="subtitle" x="50" y="459">These are dimensions of the same proposed consequence, not separate products.</text>
  <g transform="translate(50 482)">
    <rect class="axis" x="0" y="0" width="116" height="46"/><text class="label" x="16" y="20">Time</text><text class="tiny" x="16" y="36">TTL / freshness</text>
    <rect class="axis" x="126" y="0" width="116" height="46"/><text class="label" x="142" y="20">Identity</text><text class="tiny" x="142" y="36">tenant / actor</text>
    <rect class="axis" x="252" y="0" width="116" height="46"/><text class="label" x="268" y="20">Content</text><text class="tiny" x="268" y="36">redaction</text>
    <rect class="axis" x="378" y="0" width="116" height="46"/><text class="label" x="394" y="20">Evidence</text><text class="tiny" x="394" y="36">proof refs</text>
    <rect class="axis" x="504" y="0" width="116" height="46"/><text class="label" x="520" y="20">Risk</text><text class="tiny" x="520" y="36">R0-R4</text>
    <rect class="axis" x="630" y="0" width="116" height="46"/><text class="label" x="646" y="20">Scope</text><text class="tiny" x="646" y="36">capability</text>
    <rect class="axis" x="756" y="0" width="116" height="46"/><text class="label" x="772" y="20">Rollout</text><text class="tiny" x="772" y="36">shadow/enforce</text>
    <rect class="axis" x="882" y="0" width="116" height="46"/><text class="label" x="898" y="20">Consequence</text><text class="tiny" x="898" y="36">boundary</text>
    <rect class="axis" x="1008" y="0" width="116" height="46"/><text class="label" x="1024" y="20">Human</text><text class="tiny" x="1024" y="36">review</text>
    <rect class="axis" x="1134" y="0" width="116" height="46"/><text class="label" x="1150" y="20">Crypto</text><text class="tiny" x="1150" y="36">digest / binding</text>
  </g>
  <path class="arrow" d="M705 284 V405"/>

  <rect class="section" x="30" y="645" width="1260" height="290"/>
  <text class="sectionTitle" x="50" y="675">3. Release PDP: Policy, Rollout, Deterministic Checks, Release Decision</text>

  <rect class="box4" x="50" y="705" width="245" height="135"/>
  <text class="label" x="68" y="730">Policy Control Plane</text>
  <text class="small" x="68" y="752">bundles / signing / cache</text>
  <text class="small" x="68" y="770">scoping / discovery / activation</text>
  <text class="small" x="68" y="788">simulation / impact / test pack</text>
  <text class="small" x="68" y="806">runtime resolver / store</text>
  <text class="small" x="68" y="824">tenant signer / KMS boundary</text>

  <rect class="box" x="330" y="705" width="190" height="135"/>
  <text class="label" x="350" y="730">Release Material</text>
  <text class="small" x="350" y="752">target</text>
  <text class="small" x="350" y="770">output contract</text>
  <text class="small" x="350" y="788">hashes</text>
  <text class="small" x="350" y="806">capability boundary</text>

  <polygon class="diamond" points="635,690 735,745 635,800 535,745"/>
  <text class="label" x="575" y="736">Policy resolution</text>
  <text class="small" x="576" y="754">resolved / fail-state</text>

  <polygon class="diamond" points="845,690 945,745 845,800 745,745"/>
  <text class="label" x="789" y="736">Rollout resolution</text>
  <text class="small" x="795" y="754">shadow/enforce?</text>

  <polygon class="diamond" points="1055,690 1165,745 1055,800 945,745"/>
  <text class="label" x="982" y="736">Deterministic checks</text>
  <text class="small" x="1004" y="754">pass/finding/fail?</text>

  <polygon class="diamond" points="635,825 745,885 635,945 525,885"/>
  <text class="label" x="581" y="876">ReleaseDecision</text>
  <text class="small" x="568" y="894">accept / review / stop</text>

  <rect class="box2" x="785" y="835" width="180" height="78"/>
  <text class="label" x="805" y="860">Release Token</text>
  <text class="small" x="805" y="882">evidence pack</text>
  <text class="small" x="805" y="900">introspection</text>

  <rect class="box3" x="990" y="835" width="170" height="78"/>
  <text class="label" x="1010" y="860">Reviewer Queue</text>
  <text class="small" x="1010" y="882">human authority</text>
  <text class="small" x="1010" y="900">approve / reject</text>

  <path class="arrow" d="M295 772 H330"/>
  <path class="arrow" d="M520 772 L535 745"/>
  <path class="arrow" d="M735 745 H745"/>
  <path class="arrow" d="M945 745 H945"/>
  <path class="arrow" d="M1055 800 L745 875"/>
  <path class="arrow" d="M745 885 H785"/>
  <path class="arrow" d="M745 900 H990"/>

  <rect class="section" x="30" y="965" width="1260" height="350"/>
  <text class="sectionTitle" x="50" y="995">4. Domain Packs Into Admission PDP</text>

  <rect class="box2" x="50" y="1030" width="260" height="150"/>
  <text class="label" x="68" y="1055">Domain Packs</text>
  <text class="small" x="68" y="1077">finance + proof surface</text>
  <text class="small" x="68" y="1095">filing adapters</text>
  <text class="small" x="68" y="1113">crypto authorization core</text>
  <text class="small" x="68" y="1131">crypto execution admission</text>
  <text class="small" x="68" y="1149">crypto intelligence</text>
  <text class="small" x="68" y="1167">domains / healthcare / custom</text>

  <rect class="box" x="350" y="1030" width="205" height="150"/>
  <text class="label" x="370" y="1055">Admission Request</text>
  <text class="small" x="370" y="1077">generic envelope</text>
  <text class="small" x="370" y="1095">finance projection</text>
  <text class="small" x="370" y="1113">crypto projection</text>
  <text class="small" x="370" y="1131">facade maps native</text>
  <text class="small" x="370" y="1149">canonical digest</text>

  <polygon class="diamond" points="675,1015 780,1075 675,1135 570,1075"/>
  <text class="label" x="608" y="1066">Admission mode ladder</text>
  <text class="small" x="620" y="1084">observe/warn/review/enforce</text>

  <polygon class="diamond" points="900,1015 1015,1075 900,1135 785,1075"/>
  <text class="label" x="826" y="1066">Required admission checks</text>
  <text class="small" x="846" y="1084">policy/authority/evidence</text>

  <polygon class="diamond" points="1135,1015 1245,1075 1135,1135 1025,1075"/>
  <text class="label" x="1085" y="1066">Canonical decision</text>
  <text class="small" x="1090" y="1084">admit/narrow/review/block</text>

  <rect class="box" x="625" y="1190" width="230" height="80"/>
  <text class="label" x="645" y="1215">Admission Response</text>
  <text class="small" x="645" y="1237">allowed / failClosed</text>
  <text class="small" x="645" y="1255">constraints / proof / retry</text>

  <polygon class="diamond" points="1015,1180 1130,1235 1015,1290 900,1235"/>
  <text class="label" x="944" y="1226">Protected token required?</text>
  <text class="small" x="978" y="1244">yes / no</text>

  <path class="arrow" d="M310 1105 H350"/>
  <path class="arrow" d="M555 1105 L570 1075"/>
  <path class="arrow" d="M780 1075 H785"/>
  <path class="arrow" d="M1015 1075 H1025"/>
  <path class="arrow" d="M1135 1135 L855 1215"/>
  <path class="arrow" d="M855 1235 H900"/>

  <rect class="section" x="30" y="1345" width="1260" height="255"/>
  <text class="sectionTitle" x="50" y="1375">5. Enforcement PEP, Customer Gate, Terminal Outcomes</text>

  <polygon class="diamond" points="155,1415 250,1470 155,1525 60,1470"/>
  <text class="label" x="98" y="1461">Enforcement path</text>
  <text class="small" x="121" y="1479">path?</text>

  <rect class="box" x="300" y="1410" width="190" height="115"/>
  <text class="label" x="320" y="1435">Verification Profile</text>
  <text class="small" x="320" y="1457">consequence type</text>
  <text class="small" x="320" y="1475">risk class</text>
  <text class="small" x="320" y="1493">boundary kind</text>

  <polygon class="diamond" points="600,1415 705,1470 600,1525 495,1470"/>
  <text class="label" x="535" y="1461">Presentation mode ok?</text>
  <text class="small" x="551" y="1479">bearer/DPoP/mTLS</text>

  <polygon class="diamond" points="830,1415 935,1470 830,1525 725,1470"/>
  <text class="label" x="770" y="1461">Offline verification</text>
  <text class="small" x="785" y="1479">signature/digest</text>

  <polygon class="diamond" points="1060,1415 1175,1470 1060,1525 945,1470"/>
  <text class="label" x="994" y="1461">Online verification</text>
  <text class="small" x="1001" y="1479">introspection/replay</text>

  <polygon class="diamond" points="600,1530 715,1585 600,1640 485,1585"/>
  <text class="label" x="544" y="1576">Enforcement result</text>
  <text class="small" x="548" y="1594">allow/deny/shadow</text>

  <polygon class="diamond" points="830,1530 935,1585 830,1640 725,1585"/>
  <text class="label" x="781" y="1576">Customer gate</text>
  <text class="small" x="799" y="1594">proceed/hold</text>

  <circle class="term" cx="1060" cy="1570" r="44"/><text class="label white" x="1035" y="1566">RUN</text><text class="tiny white" x="1024" y="1584">consequence</text>
  <circle class="term" cx="1185" cy="1570" r="44"/><text class="label white" x="1162" y="1566">HOLD</text><text class="tiny white" x="1152" y="1584">no action</text>

  <path class="arrow" d="M250 1470 H300"/>
  <path class="arrow" d="M490 1470 H495"/>
  <path class="arrow" d="M705 1470 H725"/>
  <path class="arrow" d="M935 1470 H945"/>
  <path class="arrow" d="M1060 1525 L715 1585"/>
  <path class="arrow" d="M715 1585 H725"/>
  <path class="arrow" d="M935 1585 H1016"/>
  <path class="arrow" d="M935 1605 H1142"/>

  <rect class="section" x="30" y="1630" width="1260" height="235"/>
  <text class="sectionTitle" x="50" y="1660">6. Shared Stores, Redaction, Shadow-To-Policy Feedback</text>

  <rect class="store" x="50" y="1690" width="245" height="120"/>
  <text class="label" x="68" y="1715">Shared Stores</text>
  <text class="small" x="68" y="1737">atomic retry/replay/idempotency</text>
  <text class="small" x="68" y="1755">history + outbox</text>
  <text class="small" x="68" y="1773">worker claim / advisory lock</text>
  <text class="small" x="68" y="1791">shadow persistence</text>

  <rect class="store" x="330" y="1690" width="245" height="120"/>
  <text class="label" x="348" y="1715">Audit + Redaction</text>
  <text class="small" x="348" y="1737">34 data surfaces</text>
  <text class="small" x="348" y="1755">15 forbidden raw classes</text>
  <text class="small" x="348" y="1773">audit export / dashboard</text>
  <text class="small" x="348" y="1791">external review packet</text>

  <rect class="box4" x="610" y="1680" width="300" height="145"/>
  <text class="label" x="630" y="1705">Shadow-To-Policy Loop</text>
  <text class="small" x="630" y="1727">shadow event -> action surface</text>
  <text class="small" x="630" y="1745">risk inventory -> candidate registry</text>
  <text class="small" x="630" y="1763">active questions -> policy twin/replay</text>
  <text class="small" x="630" y="1781">review packet -> activation handoff</text>
  <text class="small" x="630" y="1799">publication -> customer activation receipt</text>

  <rect class="store" x="950" y="1690" width="290" height="120"/>
  <text class="label" x="968" y="1715">Support Surfaces</text>
  <text class="small" x="968" y="1737">identity / signing / platform / utils</text>
  <text class="small" x="968" y="1755">connectors / site / showcase</text>
  <text class="small" x="968" y="1773">model/provider registry</text>
  <text class="small" x="968" y="1791">public proof/demo material</text>

  <path class="dash" d="M600 1640 C600 1670, 720 1665, 720 1680"/>
  <path class="dash" d="M910 1750 C1030 1750, 1040 775, 295 775"/>

  <rect class="section" x="30" y="1895" width="1260" height="125"/>
  <text class="sectionTitle" x="50" y="1925">7. Top-Level Source Areas Covered By The Picture</text>
  <text class="tiny" x="50" y="1950">src/api  src/connectors  src/consequence-admission  src/crypto-authorization-core  src/crypto-execution-admission  src/crypto-intelligence  src/domains</text>
  <text class="tiny" x="50" y="1970">src/filing  src/financial  src/identity  src/platform  src/proof-surface  src/release-enforcement-plane  src/release-kernel  src/release-layer</text>
  <text class="tiny" x="50" y="1990">src/release-policy-control-plane  src/service  src/showcase  src/signing  src/utils</text>
  <text class="subtitle" x="50" y="2015">File-level code elements are documented in the folder view and tests; this picture maps the repo-level machine humans need to navigate.</text>
</svg>
