apiVersion: apps/v1
kind: Deployment
metadata:
  name: attestor-api
spec:
  replicas: 2
  minReadySeconds: 15
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: attestor-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: attestor-api
    spec:
      serviceAccountName: attestor-api-runtime
      terminationGracePeriodSeconds: 45
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: attestor-api
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: attestor-api
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: attestor-api
      containers:
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.20.0
          args:
            - "--structured-logs"
            - "--port=5432"
            - "project-9180cbda-d681-42d8-8ca:europe-west1:attestor-pg"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
        - name: api
          image: europe-west1-docker.pkg.dev/project-9180cbda-d681-42d8-8ca/attestor/attestor-api:de677b9-gke1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          command: ["node", "dist/service/api-server.js"]
          envFrom:
            - configMapRef:
                name: attestor-runtime
          env:
            - name: ATTESTOR_HA_MODE
              value: "true"
            - name: ATTESTOR_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_SERVICE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: redis-url
            - name: ATTESTOR_CONTROL_PLANE_PG_URL
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: control-plane-pg-url
            - name: ATTESTOR_BILLING_LEDGER_PG_URL
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: billing-ledger-pg-url
            - name: ATTESTOR_RELEASE_AUTHORITY_PG_URL
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: release-authority-pg-url
            - name: ATTESTOR_ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: admin-api-key
            - name: ATTESTOR_METRICS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: metrics-api-key
                  optional: true
            - name: ATTESTOR_ACCOUNT_MFA_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: account-mfa-encryption-key
            - name: STRIPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: stripe-api-key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: stripe-webhook-secret
            - name: ATTESTOR_STRIPE_PRICE_PILOT_WORKFLOW
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: stripe-price-pilot-workflow
            - name: ATTESTOR_STRIPE_PRICE_STARTER_WORKFLOW
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: stripe-price-starter-workflow
            - name: ATTESTOR_STRIPE_PRICE_PRO_WORKFLOW
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: stripe-price-pro-workflow
            - name: ATTESTOR_STRIPE_OVERAGE_PRICE_STARTER_WORKFLOW
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: stripe-overage-price-starter-workflow
            - name: ATTESTOR_STRIPE_OVERAGE_PRICE_PRO_WORKFLOW
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: stripe-overage-price-pro-workflow
            - name: ATTESTOR_BILLING_SUCCESS_URL
              value: "https://attestor.example.com/billing/success"
            - name: ATTESTOR_BILLING_CANCEL_URL
              value: "https://attestor.example.com/billing/cancel"
            - name: ATTESTOR_BILLING_PORTAL_RETURN_URL
              value: "https://attestor.example.com/settings/billing"
            - name: ATTESTOR_HOSTED_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: hosted-oidc-client-secret
                  optional: true
            - name: ATTESTOR_HOSTED_OIDC_STATE_KEY
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: hosted-oidc-state-key
                  optional: true
            - name: ATTESTOR_HOSTED_SAML_RELAY_STATE_KEY
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: hosted-saml-relay-state-key
                  optional: true
            - name: ATTESTOR_HOSTED_SAML_SP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: hosted-saml-sp-private-key
                  optional: true
            - name: ATTESTOR_HOSTED_SAML_SP_CERT
              valueFrom:
                secretKeyRef:
                  name: attestor-runtime-secrets
                  key: hosted-saml-sp-cert
                  optional: true
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 15"]
          ports:
            - containerPort: 3700
              name: http
          startupProbe:
            httpGet:
              path: /api/v1/startup
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: release-runtime-pki
              mountPath: /var/lib/attestor/release-runtime-pki
      volumes:
        - name: release-runtime-pki
          persistentVolumeClaim:
            claimName: attestor-release-runtime-pki
