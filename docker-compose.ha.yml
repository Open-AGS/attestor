services:
  proxy:
    image: nginx:1.30.1-alpine@sha256:5c5ea33561790f4d9fbcebb9ecfd4bbb781c760815b4d8b4f80b9d36c6da2659
    ports:
      - "3700:8080"
    volumes:
      - ./ops/nginx/attestor-ha.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy

  api1:
    build: .
    command: node dist/service/api-server.js
    expose:
      - "3700"
    environment:
      PORT: 3700
      ATTESTOR_INSTANCE_ID: api1
      ATTESTOR_HA_MODE: "true"
      ATTESTOR_PG_URL: postgresql://${ATTESTOR_DB_USER:?set ATTESTOR_DB_USER}:${ATTESTOR_DB_PASSWORD:?set ATTESTOR_DB_PASSWORD}@postgres:5432/${ATTESTOR_DB_NAME:-attestor}
      ATTESTOR_CONTROL_PLANE_PG_URL: postgresql://${ATTESTOR_DB_USER:?set ATTESTOR_DB_USER}:${ATTESTOR_DB_PASSWORD:?set ATTESTOR_DB_PASSWORD}@postgres:5432/${ATTESTOR_DB_NAME:-attestor}
      ATTESTOR_BILLING_LEDGER_PG_URL: postgresql://${ATTESTOR_DB_USER:?set ATTESTOR_DB_USER}:${ATTESTOR_DB_PASSWORD:?set ATTESTOR_DB_PASSWORD}@postgres:5432/${ATTESTOR_DB_NAME:-attestor}
      REDIS_URL: redis://redis:6379
      ATTESTOR_RATE_LIMIT_REDIS_URL: redis://redis:6379
      ATTESTOR_ASYNC_ACTIVE_REDIS_URL: redis://redis:6379
      ATTESTOR_TENANT_KEYS: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('node:http').get('http://localhost:3700/api/v1/ready', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  api2:
    build: .
    command: node dist/service/api-server.js
    expose:
      - "3700"
    environment:
      PORT: 3700
      ATTESTOR_INSTANCE_ID: api2
      ATTESTOR_HA_MODE: "true"
      ATTESTOR_PG_URL: postgresql://${ATTESTOR_DB_USER:?set ATTESTOR_DB_USER}:${ATTESTOR_DB_PASSWORD:?set ATTESTOR_DB_PASSWORD}@postgres:5432/${ATTESTOR_DB_NAME:-attestor}
      ATTESTOR_CONTROL_PLANE_PG_URL: postgresql://${ATTESTOR_DB_USER:?set ATTESTOR_DB_USER}:${ATTESTOR_DB_PASSWORD:?set ATTESTOR_DB_PASSWORD}@postgres:5432/${ATTESTOR_DB_NAME:-attestor}
      ATTESTOR_BILLING_LEDGER_PG_URL: postgresql://${ATTESTOR_DB_USER:?set ATTESTOR_DB_USER}:${ATTESTOR_DB_PASSWORD:?set ATTESTOR_DB_PASSWORD}@postgres:5432/${ATTESTOR_DB_NAME:-attestor}
      REDIS_URL: redis://redis:6379
      ATTESTOR_RATE_LIMIT_REDIS_URL: redis://redis:6379
      ATTESTOR_ASYNC_ACTIVE_REDIS_URL: redis://redis:6379
      ATTESTOR_TENANT_KEYS: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('node:http').get('http://localhost:3700/api/v1/ready', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  worker1:
    build: .
    command: node dist/service/worker.js
    environment:
      ATTESTOR_INSTANCE_ID: worker1
      ATTESTOR_HA_MODE: "true"
      REDIS_URL: redis://redis:6379
      ATTESTOR_PG_URL: postgresql://${ATTESTOR_DB_USER:?set ATTESTOR_DB_USER}:${ATTESTOR_DB_PASSWORD:?set ATTESTOR_DB_PASSWORD}@postgres:5432/${ATTESTOR_DB_NAME:-attestor}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker2:
    build: .
    command: node dist/service/worker.js
    environment:
      ATTESTOR_INSTANCE_ID: worker2
      ATTESTOR_HA_MODE: "true"
      REDIS_URL: redis://redis:6379
      ATTESTOR_PG_URL: postgresql://${ATTESTOR_DB_USER:?set ATTESTOR_DB_USER}:${ATTESTOR_DB_PASSWORD:?set ATTESTOR_DB_PASSWORD}@postgres:5432/${ATTESTOR_DB_NAME:-attestor}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16.11-alpine@sha256:4327b9fd295502f326f44153a1045a7170ddbfffed1c3829798328556cfd09e2
    environment:
      POSTGRES_USER: ${ATTESTOR_DB_USER:?set ATTESTOR_DB_USER}
      POSTGRES_PASSWORD: ${ATTESTOR_DB_PASSWORD:?set ATTESTOR_DB_PASSWORD}
      POSTGRES_DB: ${ATTESTOR_DB_NAME:-attestor}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attestor"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.4.7-alpine@sha256:02f2cc4882f8bf87c79a220ac958f58c700bdec0dfb9b9ea61b62fb0e8f1bfcf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
